name: Deploy API to Railway

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read
  packages: write   # ghcr.io push

jobs:
  build-and-deploy:
    name: Build & Push Docker image → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ownradio-api:latest

      - name: Trigger Railway redeploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d '{
              "query": "mutation { serviceInstanceDeploy(serviceId: \"633d032c-ee13-4f19-b82d-9cafdbcf6ced\", environmentId: \"aa5c67da-2d7f-46f9-8757-e328fc09514d\") }"
            }' | grep -q '"serviceInstanceDeploy":true' && echo "Deploy triggered" || echo "Deploy trigger failed"
