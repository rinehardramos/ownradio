name: Deploy API to Railway

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write    # for git tag push
  packages: write    # ghcr.io push

jobs:
  build-and-deploy:
    name: Build & Push Docker image → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for version script

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate version
        id: version
        run: echo "version=$(npx tsx scripts/version.ts)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          build-args: BUILD_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ownradio-api:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/ownradio-api:latest

      - name: Trigger Railway redeploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d '{
              "query": "mutation { serviceInstanceDeploy(serviceId: \"633d032c-ee13-4f19-b82d-9cafdbcf6ced\", environmentId: \"aa5c67da-2d7f-46f9-8757-e328fc09514d\") }"
            }' | grep -q '"serviceInstanceDeploy":true' && echo "Deploy triggered" || { echo "::error::Railway deploy trigger failed"; exit 1; }

      - name: Verify API deployment health
        run: npx tsx scripts/verify-deploy.ts --url=${{ vars.API_PRODUCTION_URL }}/health --expected-version=${{ steps.version.outputs.version }}

      - name: Rollback on failure
        if: failure()
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "::error::API deployment verification failed — triggering rollback"
          curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d '{
              "query": "mutation { serviceInstanceDeploy(serviceId: \"633d032c-ee13-4f19-b82d-9cafdbcf6ced\", environmentId: \"aa5c67da-2d7f-46f9-8757-e328fc09514d\") }"
            }' && echo "Rollback triggered" || echo "::warning::Rollback trigger also failed — manual intervention required"

      - name: Tag release
        if: success()
        run: |
          git tag "api-${{ steps.version.outputs.version }}"
          git push origin "api-${{ steps.version.outputs.version }}"
