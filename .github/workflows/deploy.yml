name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ── Quality gate (runs on every push & PR) ──────────────────────
  check:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx turbo typecheck lint --filter=web --filter=@ownradio/shared

  # ── Preview deploy (PRs only) ──────────────────────────────────
  preview:
    name: Deploy Preview
    needs: check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        run: echo "url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Preview deployed:** ${{ steps.deploy.outputs.url }}`
            })

  # ── Production deploy (push to main only) ──────────────────────
  production:
    name: Deploy Production
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for git tag push
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for version script

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm install -g vercel@latest

      - name: Generate version
        id: version
        run: echo "version=$(npx tsx scripts/version.ts)" >> "$GITHUB_OUTPUT"

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (env validation runs inside next.config.ts)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}

      - name: Deploy to production
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Verify deployment health
        run: npx tsx scripts/verify-deploy.ts --url=https://ownradio.net/api/health --expected-version=${{ steps.version.outputs.version }}

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::error::Deployment verification failed — rolling back to previous production deployment"
          vercel rollback --token=${{ secrets.VERCEL_TOKEN }}

      - name: Tag release
        if: success()
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
